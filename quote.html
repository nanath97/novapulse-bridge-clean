<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<style>

body{
font-family: Arial;
padding:40px;
color:#333;
}

.header{
text-align:center;
margin-bottom:40px;
}

.logo{
font-size:28px;
font-weight:bold;
}

.subtitle{
font-size:18px;
color:#666;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.table th{
border-bottom:2px solid #000;
text-align:left;
padding:10px;
}

.table td{
padding:10px;
border-bottom:1px solid #ddd;
}

.total{
margin-top:30px;
text-align:right;
font-size:20px;
font-weight:bold;
}

.footer{
margin-top:60px;
text-align:center;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">NovaPulse</div>
<div class="subtitle">Quote</div>

</div>

<p><strong>Client :</strong> {{email}}</p>
<p><strong>Date :</strong> {{date}}</p>

<table class="table">

<tr>
<th>Service</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

{{rows}}

</table>

<div class="total">
Total : {{total}} €
</div>

<div class="footer">
Propulsé par NovaPulse
</div>

</body>
</html>
