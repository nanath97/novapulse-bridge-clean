<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Devis NovaPulse</title>

<style>

body{
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
color:#111;
border-radius:12px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

th{
text-align:left;
padding:10px;
border-bottom:2px solid #eee;
}

td{
padding:10px;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.add{
background:#6366f1;
color:white;
margin-top:10px;
}

.generate{
background:#10b981;
color:white;
width:100%;
margin-top:15px;
font-size:16px;
}

.total{
text-align:right;
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.footer{
text-align:center;
font-size:12px;
color:#aaa;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>NovaPulse</h1>
<div class="subtitle">Création de devis express</div>

<table id="table">
<thead>
<tr>
<th>Service</th>
<th>Qté</th>
<th>Prix €</th>
<th>Total</th>
</tr>
</thead>

<tbody id="rows"></tbody>
</table>

<button class="add" onclick="addRow()">+ Ajouter un service</button>

<div class="total" id="total">Total : 0 €</div>

<div style="margin-top:15px">
  <input id="tvaInput" type="number" placeholder="TVA (%) ex: 20" min="0" max="100">
</div>

<button class="generate" onclick="generate()">Générer le devis</button>

<div class="footer">Propulsé par NovaPulse</div>

</div>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const topic = params.get("topic")

function addRow(){

const tbody=document.getElementById("rows")

const row=document.createElement("tr")

row.innerHTML=`
<td><input placeholder="Service"></td>
<td><input type="number" value="1" min="1"></td>
<td><input type="number" value="0" min="0"></td>
<td class="lineTotal">0 €</td>
`

tbody.appendChild(row)

row.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",updateTotal)
})

}

function updateTotal(){

let total = 0

document.querySelectorAll("#rows tr").forEach(r=>{

const qty = Number(r.children[1].querySelector("input").value || 0)
const price = Number(r.children[2].querySelector("input").value || 0)

const line = qty * price

r.children[3].innerText = line + " €"

total += line

})

// 👉 TVA dynamique
const tvaInput = document.getElementById("tvaInput")
const tva = Number(tvaInput?.value || 0)

// sécurité
const safeTva = isNaN(tva) ? 0 : Math.max(0, tva)

// calcul
const tvaAmount = total * (safeTva / 100)
const totalTTC = total + tvaAmount

// affichage propre
document.getElementById("total").innerText =
  `HT : ${total.toFixed(2)} € | TVA : ${tvaAmount.toFixed(2)} € | TTC : ${totalTTC.toFixed(2)} €`

}
document.getElementById("tvaInput").addEventListener("input", updateTotal)

async function generate(){

const items=[]

document.querySelectorAll("#rows tr").forEach(r=>{

const service=r.children[0].querySelector("input").value
const qty=r.children[1].querySelector("input").value
const price=r.children[2].querySelector("input").value

items.push({service,qty,price})

})

// 👉 TVA récupérée ici (AVANT le fetch)
const tva = document.getElementById("tvaInput").value

await fetch("/generate-quote",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
topic,
items,
tva
})
})

alert("✅ Devis envoyé")

}

addRow()

</script>

</body>
</html>
